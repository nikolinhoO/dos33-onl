services:
  app:
    container_name: game_app 
    build: app/
    networks:
      - frontend
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy 

  postgres:
    image: postgres:16
    container_name: game_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: game_nginx
    ports:
      - 8080:80
    networks:
      - frontend
    volumes:
      - /home/ubuntu/Docker_hw/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

volumes:
  postgres_data:

networks:
  frontend:
  backend:
