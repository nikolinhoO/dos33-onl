---
- name: Базовая настройка сервера Ubuntu 24.04
  hosts: all
  vars:
    db_name: books_DB
    db_user: hw_nikolaev
    db_password: 123456
  become: true
  tasks:
    - name: Обновление пакетов apt
      ansible.builtin.apt:
        update_cache: yes

    - name: Установка PostgreSQL
      ansible.builtin.apt:
        name: postgresql
        state: present

    - name: Показать data_direcory
      shell: sudo -u postgres psql -c "SHOW data_directory;"
      register: result_data_directory

    - name: Отобразить переменную result_data_directory
      debug:
        var: result_data_directory.stdout_lines

    - name: Создание роли в DB
      community.postgresql.postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        role_attr_flags: LOGIN
        state: present
        login_user: postgres

    - name: Создание DB
      community.general.postgresql_db:
        name: "{{ db_name }}"
        owner: "{{ db_user }}"
        encoding: UTF-8
        lc_collate: en_US.UTF-8
        lc_ctype: en_US.UTF-8
        state: present

    - name: Показать запрос '\l'
      shell: sudo -u postgres psql -c "\l"
      register: result_listing

    - name: Отобразить переменную result_listing
      debug:
        var: result_listing.stdout_lines

    - name: Показать запрос 'pg_stat_activity'
      shell: sudo -u postgres psql -c "SELECT pid, datname, usename, state FROM pg_stat_activity WHERE datname IS NOT NULL"
      register: result_pg_stat_activity

    - name: Отобразить переменную result_pg_stat_activity
      debug:
        var: result_pg_stat_activity.stdout_lines
